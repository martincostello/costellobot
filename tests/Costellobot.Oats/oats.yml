name: oats
interval: 500ms
fixture:
  compose:
    file: ./../../docker-compose.yml
seed:
  type: app
input:
  - path: /version
  - path: /github-webhook
    method: POST
    headers:
      Accept: '*/*'
      Content-Type: application/json; charset=utf-8
      User-Agent: GitHub-Hookshot/f05835d
      X-GitHub-Delivery: 09e27db8-e74c-4a28-a951-50552382af03
      X-GitHub-Event: ping
      X-GitHub-Hook-ID: "109948940"
      X-GitHub-Hook-Installation-Target-ID: "183256"
      X-GitHub-Hook-Installation-Target-Type: integration
    body: |-
      {
        "zen": "Responsive is better than fast.",
        "hook_id": 109948940,
        "hook": {
          "type": "App",
          "id": 109948940,
          "name": "web",
          "active": true,
          "config": {
            "content_type": "json",
            "insecure_ssl": "0",
            "secret": "my-secret",
            "url": "https://costellobot.martincostello.local/github-webhook"
          },
          "deliveries_url": "https://api.github.com/app/hook/deliveries",
          "events": ["*"],
          "ping_url": "https://api.github.com/app/hook/109948940/pings",
          "url": "https://api.github.com/app/hook/109948940"
        },
        "updated_at": "2022-03-23T23:13:43Z",
        "created_at": "2022-03-23T23:13:43Z",
        "app_id": 349596565,
        "installation": {
          "id": 183256,
          "node_id": "c0dctApWjo2ooEXO0RATfhWfiQrE2og7axfcZRs6gEk="
        }
      }
expected:
  logs:
    - logql: '{ service_name="Costellobot" } |~ `Application started.`'
      match:
        - match_type: regexp
          name: Application started
  metrics:
    - promql: costellobot_github_webhook_delivery_total{ github_webhook_event="ping" }
      value: '>= 1'
    - promql: dotnet_process_memory_working_set_bytes{}
      value: '>= 1'
    - promql: http_client_request_duration_seconds_count{}
      value: '>= 1'
    - promql: http_server_request_duration_seconds_count{}
      value: '>= 1'
  profiles:
    - query: process_cpu:cpu:nanoseconds:cpu:nanoseconds{ service_name="Costellobot" }
      match:
        - match_type: regexp
          name: MartinCostello.Costellobot!
    - query: memory:alloc_size:bytes:space:bytes{ service_name="Costellobot" }
      match:
        - match_type: regexp
          name: MartinCostello.Costellobot!
  traces:
    - traceql: '{ span.messaging.operation = "receive" }'
      match_spans:
        - name: ServiceBusReceiver.Receive
          attributes:
            - key: az.namespace
              value: Microsoft.ServiceBus
            - key: messaging.destination.name
              value: queue.1
            - key: messaging.operation
              value: receive
            - key: messaging.system
              value: servicebus
    - traceql: '{ span.http.route =~ "/github-webhook" }'
      match_spans:
        - name: POST /github-webhook
          attributes:
            - key: github.webhook.delivery
              value: 09e27db8-e74c-4a28-a951-50552382af03
            - key: github.webhook.event
              value: ping
            - key: github.webhook.hook.id
              value: "109948940"
            - key: github.webhook.hook.installation.target.id
              value: "183256"
            - key: http.request.method
              value: POST
            - key: http.response.status_code
              value: "200"
        - match_type: regexp
          attributes:
            - key: messaging.message.id
              value: .+
    - traceql: '{ span.http.route =~ "/github-webhook" }'
      match_spans:
        - name: ServiceBusProcessor.ProcessMessage
          attributes:
            - key: az.namespace
              value: Microsoft.ServiceBus
            - key: messaging.destination.name
              value: queue.1
            - key: messaging.operation
              value: process
            - key: messaging.system
              value: servicebus
    - traceql: '{ span.http.route =~ "/github-webhook" }'
      match_spans:
        - name: ServiceBusReceiver.Complete
          attributes:
            - key: az.namespace
              value: Microsoft.ServiceBus
            - key: messaging.destination.name
              value: queue.1
            - key: messaging.operation
              value: settle
            - key: messaging.system
              value: servicebus
    - traceql: '{ span.http.route =~ "/github-webhook" }'
      match_spans:
        - name: ServiceBusSender.Send
          attributes:
            - key: az.namespace
              value: Microsoft.ServiceBus
            - key: messaging.destination.name
              value: queue.1
            - key: messaging.operation
              value: publish
            - key: messaging.system
              value: servicebus
    - traceql: '{ span.http.route =~ "/version" }'
      match_spans:
        - name: GET /version
          attributes:
            - key: cloud.provider
              value: azure
            - key: http.request.method
              value: GET
            - key: http.response.status_code
              value: "200"
            - key: os.name
              value: Ubuntu
            - key: os.type
              value: linux
            - key: process.runtime.name
              value: .NET
            - key: service.name
              value: Costellobot
            - key: service.namespace
              value: Costellobot
            - key: telemetry.sdk.language
              value: dotnet
            - key: telemetry.sdk.name
              value: opentelemetry
        - match_type: regexp
          attributes:
            - key: container.id
              value: .+
            - key: host.name
              value: .+
            - key: os.build_id
              value: .+
            - key: os.description
              value: .+
            - key: os.version
              value: .+
            - key: process.runtime.description
              value: .NET.+
            - key: process.runtime.version
              value: .+
            - key: service.instance.id
              value: .+
            - key: service.version
              value: 1.0.\d+
            - key: telemetry.sdk.version
              value: .+
