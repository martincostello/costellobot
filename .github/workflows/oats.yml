name: oats

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.gitattributes'
      - '**/*.gitignore'
      - '**/*.md'
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: 3
  TERM: xterm

permissions: {}

jobs:
  oats:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:

      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Update agent configuration
        shell: pwsh
        run: |
          $nugetHome = "~/.nuget/packages"
          if (-Not (Test-Path $nugetHome)) {
            New-Item -Path $nugetHome -Type Directory -Force | Out-Null
          }
          $nugetHome = Resolve-Path $nugetHome
          "NUGET_PACKAGES=$nugetHome" >> ${env:GITHUB_ENV}

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: 'tree:0'
          persist-credentials: false
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          cache: false
          go-version: '1.26'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'

      - name: Build container
        id: build
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYROSCOPE_ARCH: 'x86_64'
          PYROSCOPE_VARIANT: 'glibc'
          # renovate: datasource=github-releases depName=Pyroscope packageName=grafana/pyroscope-dotnet extractVersion=^pyroscope-(?<version>.+)$
          PYROSCOPE_VERSION: '1.4.0'
          UsePyroscope: 'true'
        run: |
          Write-Output "Downloading Pyroscope ${env:PYROSCOPE_VERSION}..."

          $archive = Join-Path ${env:RUNNER_TEMP} "pyroscope.tar.gz"
          $pyroscopeTag = "pyroscope-${env:PYROSCOPE_VERSION}"
          $pyroscopeAsset = "pyroscope.${env:PYROSCOPE_VERSION}-${env:PYROSCOPE_VARIANT}-${env:PYROSCOPE_ARCH}.tar.gz"

          gh release download $pyroscopeTag --pattern $pyroscopeAsset --output $archive --repo "grafana/pyroscope-dotnet"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to download Pyroscope ${env:PYROSCOPE_VERSION}."
            exit 1
          }

          Write-Output "Extracting Pyroscope archive..."

          $targetPath = Join-Path ${env:GITHUB_WORKSPACE} ".pyroscope"
          New-Item -Path $targetPath -Type Directory -Force | Out-Null
          tar -xzf $archive -C $targetPath

          chmod +x (Join-Path $targetPath "Pyroscope.Linux.ApiWrapper.x64.so")
          chmod +x (Join-Path $targetPath "Pyroscope.Profiler.Native.so")

          dotnet publish ./src/Costellobot --arch x64 --os linux -p:PublishProfile=DefaultContainer -p:SetGitHubContainerPublishingOutputs=true

      - name: Tag container
        env:
          CONTAINER_TAG: ${{ steps.build.outputs.container-tag }}
          OATS_TAG: costellobot:latest
        run: docker tag "${CONTAINER_TAG}" "${OATS_TAG}"

      - name: Install OATS
        env:
          # renovate: datasource=github-releases depName=oats packageName=grafana/oats
          OATS_VERSION: v0.7.0
        run: |
          go install "github.com/grafana/oats@${OATS_VERSION}"

      - name: Run OATS
        env:
          # renovate: datasource=github-releases depName=LGTM packageName=grafana/docker-otel-lgtm
          LGTM_VERSION: '0.29.0'
        run: oats --lgtm-version="${LGTM_VERSION}" --timeout=5m ./tests/Costellobot.Oats
