services:
  costellobot:
    image: ${DOCKER_REGISTRY-}costellobot:latest
    depends_on:
      - servicebus-emulator
    ports:
      - '8080:8080'
    environment:
      - ConnectionStrings__AzureServiceBus=Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - ConnectionStrings__AzureTableStorage=UseDevelopmentStorage=true
      - DOTNET_ENVIRONMENT=Production
      - GitHub__ClientId=github-client-id
      - GitHub__ClientSecret=github-client-secret
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://lgtm:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - PYROSCOPE_APPLICATION_NAME=Costellobot
      - PYROSCOPE_PROFILING_ENABLED=1
      - PYROSCOPE_SERVER_ADDRESS=http://lgtm:4040
      - Webhook__QueueName=queue.1
      - WEBSITE_SITE_NAME=Costellobot
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:2.0.1@sha256:5a96d893b245031740f7d46e0fe5ff282d24b78c4b7d761dd57590f3f010a9b3
    depends_on:
      - sql-server
    ports:
      - '5300:5300'
      - '5672:5672'
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=C0st3ll0b0t$
      - SQL_SERVER=sql-server:1433
  sql-server:
    image: mcr.microsoft.com/mssql/server:2025-latest@sha256:2cd0aec4a3bfc3cf9205bed3f7922f4c6208f7c767dc62edcee308d0fd7d56d0
    ports:
      - '1433:1433'
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=C0st3ll0b0t$
